name: Release

on:
  workflow_run:
    workflows:
      - Test
    branches:
      - main
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: GitHub
    # Prevent an initial run on repository creation using this template.
    # Remove the repository check in repositories created from this template.
    if: >-
      github.event.workflow_run.conclusion == 'success' && github.repository == 'craigsloggett-lab/go-project-template'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a GitHub Release
        id: release
        uses: craigsloggett/create-github-release@8b7081c5cbea2b0eb6df4412ab587893e8ec8dba # v1.0.16
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
